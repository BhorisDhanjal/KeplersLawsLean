name = "KeplersLawsComomentMaps"
version = "0.1.0"
keywords = ["math"]
defaultTargets = ["Kepler"]

[leanOptions]
pp.unicode.fun = true
relaxedAutoImplicit = false
weak.linter.mathlibStandardSet = true
maxSynthPendingDepth = 3

[[require]]
name = "checkdecls"
git = "https://github.com/PatrickMassot/checkdecls.git"

[[require]]
name = "mathlib"
scope = "leanprover-community"
rev = "v4.29.0-rc6"

[[lean_lib]]
name = "Kepler"
