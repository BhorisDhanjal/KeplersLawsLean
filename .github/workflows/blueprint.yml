name: Compile blueprint

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: ${{ github.ref }}-blueprint
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: leanprover/lean-action@v1
        with:
          build: true
          lint: false
          use-mathlib-cache: true

      - name: Install blueprint tools
        run: |
          sudo apt-get update
          sudo apt-get install -y graphviz libgraphviz-dev pkg-config
          python3 -m venv env
          source env/bin/activate
          pip install --upgrade pip
          pip install leanblueprint pygraphviz

      - name: Build blueprint
        run: |
          source env/bin/activate
          leanblueprint web
          mkdir -p home_page
          cp -r blueprint/web home_page/blueprint
          cp blueprint/print/print.pdf home_page/blueprint.pdf 2>/dev/null || true

      - name: Upload artifact
        if: github.ref == 'refs/heads/main'
        uses: actions/upload-pages-artifact@v3
        with:
          path: home_page

  deploy:
    needs: build
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
